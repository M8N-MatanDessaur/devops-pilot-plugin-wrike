<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="/plugins/sdk/devops-pilot-sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--surface2); }
  body { margin: 0; font-size: 12px; overflow-y: auto; }
  .header {
    padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--subtext0);
    text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--surface0);
    display: flex; align-items: center; position: sticky; top: 0; background: var(--base); z-index: 1;
  }
  .spacer { flex: 1; }
  .refresh-btn { cursor: pointer; background: none; border: none; color: var(--subtext0); font: 10px var(--font-ui); padding: 2px 6px; border-radius: var(--radius); }
  .refresh-btn:hover { color: var(--text); background: var(--surface0); }
  .item { padding: 8px 12px; border-bottom: 1px solid var(--surface0); cursor: pointer; transition: background 0.1s; }
  .item:hover { background: var(--surface0); }
  .item-row1 { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .item-name { flex: 1; min-width: 0; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
  .item-time { font-size: 10px; color: var(--overlay1); white-space: nowrap; flex-shrink: 0; }
  .item-row2 { display: flex; align-items: center; gap: 6px; }
  .badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .badge.Active { background: var(--blue); color: var(--crust); }
  .badge.Completed { background: var(--green); color: var(--crust); }
  .badge.Deferred { background: var(--overlay0); color: var(--subtext0); }
  .importance { font-size: 10px; color: var(--subtext0); }
  .item-hint { font-size: 10px; color: var(--overlay1); margin-left: auto; opacity: 0; transition: opacity 0.1s; }
  .item:hover .item-hint { opacity: 1; }
  .empty { padding: 24px 12px; color: var(--subtext0); text-align: center; font-size: 12px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="header">
    Recent Tasks
    <div class="spacer"></div>
    <button class="refresh-btn" onclick="load()">Refresh</button>
  </div>
  <div id="feed"><div class="empty">Loading...</div></div>
<script>
var API = '/api/plugins/wrike';

async function load() {
  var feed = document.getElementById('feed');
  feed.innerHTML = '<div class="empty">Loading...</div>';
  try {
    var cfg = await doFetch('GET', '/config');
    if (!cfg.configured) { feed.innerHTML = '<div class="empty">Not connected.<br>Open Settings > Plugins > Wrike.</div>'; return; }

    var tasks = await doFetch('GET', '/tasks?limit=30');
    if (!Array.isArray(tasks) || !tasks.length) { feed.innerHTML = '<div class="empty">No recent tasks</div>'; return; }

    // Sort by updated date
    tasks.sort(function(a,b){ return new Date(b.updatedDate||0) - new Date(a.updatedDate||0); });

    var html = '';
    for (var i = 0; i < tasks.length; i++) {
      var t = tasks[i];
      html += '<div class="item" onclick="ask(\''+t.id+'\',\''+esc((t.title||'').replace(/'/g,''))+'\')" title="Click to inspect with AI">' +
        '<div class="item-row1"><span class="item-name">'+esc(t.title)+'</span><span class="item-time">'+timeAgo(t.updatedDate)+'</span></div>' +
        '<div class="item-row2"><span class="badge '+t.status+'">'+t.status+'</span>' +
        (t.importance ? '<span class="importance">'+t.importance+'</span>' : '') +
        '<span class="item-hint">Ask AI</span></div></div>';
    }
    feed.innerHTML = html;
  } catch(e) { feed.innerHTML = '<div class="empty">Error: '+esc(e.message)+'</div>'; }
}

function ask(id, name) {
  DevOpsPilot.askAi('Fetch this Wrike task:\ncurl -s http://127.0.0.1:3800/api/plugins/wrike/tasks/'+id+'\n\nShow me "'+name+'" in a readable format. Ask what I want to do -- update status, change dates, add a comment, or reassign.');
}

async function doFetch(m, p) { return (await fetch('http://127.0.0.1:3800'+API+p, {method:m, headers:{'Content-Type':'application/json'}})).json(); }
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function timeAgo(ts){if(!ts)return'';var d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000);if(m<1)return'now';if(m<60)return m+'m';var h=Math.floor(m/60);if(h<24)return h+'h';var dy=Math.floor(h/24);if(dy<30)return dy+'d';return new Date(ts).toLocaleDateString();}

load();
setInterval(load, 120000);
</script>
</body>
</html>
